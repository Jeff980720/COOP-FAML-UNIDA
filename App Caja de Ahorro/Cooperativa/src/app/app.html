<!-- 
  Este es tu componente "Shell" o "App" principal.
  Reemplaza el contenido de tu app.component.html con esto.
-->
<div class="flex flex-col min-h-screen bg-gray-900 text-gray-100">

  <!-- BARRA DE NAVEGACIÓN FIJA -->
  <nav *ngIf="mostrarMenu" class="bg-gray-800 p-4 shadow-lg sticky top-0 z-10 w-full">
    <div class="w-full flex justify-center flex-wrap gap-4 md:gap-6">

      <a routerLink="/inicio" routerLinkActive="active-link" class="nav-button">
        Inicio
      </a>

      <a routerLink="/socios" routerLinkActive="active-link" class="nav-button">
        Socios
      </a>

      <a routerLink="/listaportes" routerLinkActive="active-link" class="nav-button">
        Lista Aportes
      </a>

      <a routerLink="/litaprestamos" routerLinkActive="active-link" class="nav-button">
        Lista Prestamos
      </a>

      <a routerLink="/listapagos" routerLinkActive="active-link" class="nav-button">
        Lista Pagos
      </a>

      <a routerLink="/listacaja" routerLinkActive="active-link" class="nav-button">
        Lista Cierres de Caja
      </a>

      <a routerLink="/estado-resultados" routerLinkActive="active-link" class="nav-button">
        Estado de Resultados
      </a>

      <a routerLink="/dashboard" routerLinkActive="active-link" class="nav-button">
        Dashaboard
      </a>

      <div class="flex-grow"></div>
      <div class="flex items-center gap-4 text-sm">
        <span class="hidden md:inline font-medium text-blue-400">
          {{ nombreUsuario }}
        </span>

        <button routerLink="/configuracion" class="p-2 hover:bg-gray-700 rounded-full transition-colors"
          title="Configurar Usuarios">
          <mat-icon>settings</mat-icon>
        </button>

        <button (click)="confirmarSalida()" class="p-2 hover:bg-red-900/30 text-red-400 rounded-full transition-colors"
          title="Cerrar Sesión">
          <mat-icon>logout</mat-icon>
        </button>
      </div>

    </div>
  </nav>

  <!-- ÁREA DE CONTENIDO PRINCIPAL -->
  <main class="w-full px-1 py-1 flex-grow">
    <!-- 
      ¡ESTA ES LA PARTE MÁS IMPORTANTE!
      Aquí es donde Angular cargará dinámicamente tu
      InicioComponent o SociosComponent, basado en la URL.
    -->
    <router-outlet></router-outlet>
  </main>

  <!-- Pie de página (opcional) -->
  <footer *ngIf="mostrarMenu" class="bg-gray-800 p-4 text-center text-gray-500">
    Caja de Ahorro Familia Unida © 2022 - {{ currentYear }}
  </footer>

</div>
