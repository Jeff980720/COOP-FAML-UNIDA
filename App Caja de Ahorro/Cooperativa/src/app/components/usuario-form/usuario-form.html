<div class="p-2 bg-gray-800 text-white rounded-lg">
    <h2 mat-dialog-title class="text-blue-400 border-b border-gray-700 pb-2 text-2xl font-bold">
        {{ data ? 'Actualizar Usuario' : 'Registrar Nuevo Usuario' }}
    </h2>

    <mat-dialog-content class="mt-4">
        <form [formGroup]="userForm" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2">

            <mat-form-field appearance="outline" class="w-full custom-field">
                <mat-label>Nombre de Usuario</mat-label>
                <input matInput formControlName="username" placeholder="Ej: jeff98">
                <mat-icon matSuffix class="text-gray-400">person</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full custom-field" *ngIf="!data">
                <mat-label>Contraseña</mat-label>
                <input matInput formControlName="password" type="password">
                <mat-icon matSuffix class="text-gray-400">lock</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full col-span-full custom-field">
                <mat-label>Nombre Completo</mat-label>
                <input matInput formControlName="nombre_completo" placeholder="Ej: Jefferson Toaquiza">
                <mat-icon matSuffix class="text-gray-400">badge</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Rol asignado</mat-label>
                <mat-select formControlName="rol">
                    <mat-option value="ADMIN">admin</mat-option>
                    <mat-option value="USER1">user1</mat-option>
                    <mat-option value="USER2">user2</mat-option>
                    <mat-option value="USER3">user3</mat-option>
                    <mat-option value="USER4">user4</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full custom-field" *ngIf="data">
                <mat-label>Estado de Cuenta</mat-label>
                <mat-select formControlName="estado">
                    <mat-option [value]="true" class="text-green-500">ACTIVO</mat-option>
                    <mat-option [value]="false" class="text-red-500">INACTIVO</mat-option>
                </mat-select>
            </mat-form-field>

        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="gap-2 pt-4 border-t border-gray-700">
        <button mat-button (click)="cancelar()" class="text-gray-400 hover:text-white">
            Cancelar
        </button>
        <button mat-flat-button color="primary" [disabled]="userForm.invalid" (click)="guardar()"
            class="px-6 rounded-md shadow-lg">
            <mat-icon class="mr-1">save</mat-icon>
            {{ data ? 'Guardar Cambios' : 'Crear Usuario' }}
        </button>
    </mat-dialog-actions>
</div>
